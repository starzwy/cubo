<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubo Branco 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background-color: #1a1a2e;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';

        // Configuração da cena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // Configuração da câmera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3, 5);
        camera.lookAt(0, 0, 0);

        // Configuração do renderizador
        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // Grupo para o cubo
        const cubeGroup = new THREE.Group();
        scene.add(cubeGroup);

        // Configurações dos cubos
        const cubeSize = 0.96;
        const spacing = 1.04;
        const whiteColor = 0xffffff;

        // Função para criar um cubo pequeno com bordas
        function createMiniCube(x, y, z) {
            const geometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
            const material = new THREE.MeshBasicMaterial({
                color: whiteColor
            });
            
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(x, y, z);
            
            // Adicionar bordas pretas para destacar as divisões
            const edgesGeo = new THREE.EdgesGeometry(geometry);
            const edgesMat = new THREE.LineBasicMaterial({ color: 0x000000 });
            const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
            cube.add(wireframe);
            
            return cube;
        }

        // Criar os 27 cubos (3x3x3)
        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                for (let z = -1; z <= 1; z++) {
                    const posX = x * spacing;
                    const posY = y * spacing;
                    const posZ = z * spacing;
                    
                    const miniCube = createMiniCube(posX, posY, posZ);
                    cubeGroup.add(miniCube);
                }
            }
        }

        // Controle de rotação com mouse
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotationX = 0;
        let rotationY = 0;

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = {
                x: e.clientX,
                y: e.clientY
            };
            canvas.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;
            
            rotationY += deltaX * 0.01;
            rotationX += deltaY * 0.01;
            
            rotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotationX));
            
            cubeGroup.rotation.x = rotationX;
            cubeGroup.rotation.y = rotationY;
            
            previousMousePosition = {
                x: e.clientX,
                y: e.clientY
            };
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            canvas.style.cursor = 'grab';
        });

        // Suporte para touch
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            const touch = e.touches[0];
            previousMousePosition = {
                x: touch.clientX,
                y: touch.clientY
            };
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDragging) return;
            
            const touch = e.touches[0];
            const deltaX = touch.clientX - previousMousePosition.x;
            const deltaY = touch.clientY - previousMousePosition.y;
            
            rotationY += deltaX * 0.01;
            rotationX += deltaY * 0.01;
            rotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotationX));
            
            cubeGroup.rotation.x = rotationX;
            cubeGroup.rotation.y = rotationY;
            
            previousMousePosition = {
                x: touch.clientX,
                y: touch.clientY
            };
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        canvas.style.cursor = 'grab';

        // Animação de renderização
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        animate();

        // Ajustar ao redimensionar
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
